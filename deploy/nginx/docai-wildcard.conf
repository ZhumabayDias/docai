# Wildcard routing for deployed projects: https://<subdomain>.docai.site
#
# This config intentionally contains NO business logic and NO project
# names. Its only job is to:
#   1. Forward the raw hostname it received to the backend's internal
#      routing endpoint via `auth_request`.
#   2. Read back the upstream port that endpoint decided on.
#   3. Proxy the request there.
#
# Every decision — is this hostname well-formed, does it belong to
# docai.site, is it reserved, does a project exist for it, is that
# project's deployment currently RUNNING — is made exclusively by
# app.services.routing_service.RoutingService on the backend. If that
# service ever rejects the hostname, this config just relays the
# resulting status code to the visitor; it never second-guesses it.
#
# Docker/container ports are never exposed directly to end users: the
# only public entry points are 80/443 on this vhost.

server {
    listen 80;
    server_name *.docai.site;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name *.docai.site;

    # Wildcard certificate covering *.docai.site (see PR-3 for automated
    # issuance/renewal; for now this assumes a cert obtained out-of-band,
    # e.g. via DNS-01 challenge).
    ssl_certificate     /etc/letsencrypt/live/docai.site-wildcard/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docai.site-wildcard/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Guard against oversized/garbage Host headers before they even reach
    # the routing-resolution subrequest.
    large_client_header_buffers 4 8k;

    # --- internal routing-resolution subrequest -----------------------
    # Not reachable by clients directly (`internal;`). Forwards only the
    # hostname Nginx received; the backend decides everything else. Body
    # is dropped since this is a pure lookup.
    location = /internal/routing/resolve {
        internal;

        proxy_pass http://127.0.0.1:8000/internal/routing/resolve;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-Host $host;
    }

    # --- public entry point --------------------------------------------
    location / {
        auth_request /internal/routing/resolve;

        # Pull the resolved upstream port (and project id, for logging/
        # header propagation) out of the auth_request response headers.
        auth_request_set $upstream_port $upstream_http_x_upstream_port;
        auth_request_set $upstream_project_id $upstream_http_x_project_id;

        # Map the routing endpoint's rejection status codes to friendly
        # named locations. The *meaning* of each code (malformed /
        # reserved / unknown / inactive) is entirely decided by
        # RoutingService — this is just a status-code relay.
        error_page 400 = @routing_malformed;
        error_page 403 = @routing_reserved;
        error_page 404 = @routing_unknown;
        error_page 503 = @routing_inactive;

        # No `resolver` directive is required here: the upstream host is
        # the literal loopback address 127.0.0.1, not a DNS name, so only
        # the port is dynamic. If the app backend ever moves off-box,
        # add `resolver <dns-ip>;` at the server/http level.
        proxy_pass http://127.0.0.1:$upstream_port;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Project-Id $upstream_project_id;
    }

    location @routing_malformed { return 400 "Invalid hostname\n"; }
    location @routing_reserved  { return 403 "This subdomain is reserved\n"; }
    location @routing_unknown   { return 404 "No deployment found for this subdomain\n"; }
    location @routing_inactive  { return 503 "This deployment is not currently running\n"; }
}
